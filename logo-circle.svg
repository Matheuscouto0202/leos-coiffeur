<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#1e1a12"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="150" cy="150" r="150" fill="url(#bgGrad)"/>

  <!-- Outer ring -->
  <circle cx="150" cy="150" r="142" fill="none" stroke="#C8A96E" stroke-width="2.2" opacity="0.58"/>
  <!-- Inner thin ring -->
  <circle cx="150" cy="150" r="130" fill="none" stroke="#C8A96E" stroke-width="0.8" opacity="0.24"/>

  <!-- Cardinal diamonds -->
  <path d="M150 10 L155 20 L150 30 L145 20Z" fill="#C8A96E" opacity="0.85"/>
  <path d="M150 270 L155 280 L150 290 L145 280Z" fill="#C8A96E" opacity="0.85"/>
  <path d="M10 150 L20 155 L30 150 L20 145Z" fill="#C8A96E" opacity="0.85"/>
  <path d="M270 150 L280 155 L290 150 L280 145Z" fill="#C8A96E" opacity="0.85"/>

  <!-- Decorative horizontal rules -->
  <line x1="72" y1="198" x2="228" y2="198" stroke="#C8A96E" stroke-width="1.1" opacity="0.45"/>
  <line x1="92" y1="202" x2="208" y2="202" stroke="#C8A96E" stroke-width="0.5" opacity="0.26"/>

  <!-- L — elegant italic serif -->
  <text x="150" y="186"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="110"
    font-style="italic"
    font-weight="normal"
    fill="#C8A96E"
    text-anchor="middle">L</text>

  <!-- COIFFEUR -->
  <text x="150" y="228"
    font-family="Arial, Helvetica, sans-serif"
    font-size="13.5"
    font-weight="400"
    fill="#C8A96E"
    text-anchor="middle"
    letter-spacing="7"
    opacity="0.74">COIFFEUR</text>
</svg>
