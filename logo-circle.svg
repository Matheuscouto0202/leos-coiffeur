<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="150" cy="150" r="150" fill="url(#bgGrad)"/>

  <!-- Outer golden ring -->
  <circle cx="150" cy="150" r="143" fill="none" stroke="#FFB300" stroke-width="4.5"/>

  <!-- Inner dashed ring -->
  <circle cx="150" cy="150" r="132" fill="none" stroke="#FFB300" stroke-width="0.9" opacity="0.35" stroke-dasharray="2 7"/>

  <!-- Top decorative rule with center dot -->
  <line x1="78" y1="96" x2="128" y2="96" stroke="#FFB300" stroke-width="1.1" opacity="0.65"/>
  <circle cx="150" cy="96" r="2.8" fill="#FFB300" opacity="0.85"/>
  <line x1="172" y1="96" x2="222" y2="96" stroke="#FFB300" stroke-width="1.1" opacity="0.65"/>

  <!-- Main monogram BP -->
  <text x="150" y="168"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="900"
        font-size="80"
        fill="#FFB300"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="-1">BP</text>

  <!-- Separator line -->
  <line x1="56" y1="192" x2="244" y2="192" stroke="#FFB300" stroke-width="1.3" opacity="0.7"/>

  <!-- BARBER PRIME -->
  <text x="150" y="212"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="15"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="5">BARBER PRIME</text>

  <!-- CLUB -->
  <text x="150" y="233"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="400"
        font-size="11.5"
        fill="#FFB300"
        text-anchor="middle"
        letter-spacing="10">CLUB</text>
</svg>
